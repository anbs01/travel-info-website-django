{% extends 'base.html' %}
{% load static %}

{% block title %}系统维护中 - 500 - 旅游信息网{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-gray-50 py-20 px-4">
    <div class="max-w-xl w-full text-center">
        <!-- 视觉符号 -->
        <div class="relative mb-8">
            <h1 class="text-[180px] font-black text-gray-200 leading-none select-none">500</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="text-travel-brown/80">
                    <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </div>
            </div>
        </div>

        <h2 class="text-3xl font-bold text-gray-900 mb-4 tracking-widest">路途维护中...</h2>
        <p class="text-gray-500 mb-10 text-lg leading-relaxed">
            抱歉，服务器暂时偏离了路线。我们的“向导”已收到信号，正快马加鞭进行修复。
            <br>
            请您稍后再试，或者向我们反馈您遇到的各种情况。
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-4">
            <a href="{% url 'core:index' %}" class="w-full sm:w-auto px-8 py-3 bg-travel-brown text-white font-bold tracking-widest hover:bg-opacity-90 transition-all shadow-md active:scale-95">
                刷新重试
            </a>
            <button onclick="window.history.back()" class="w-full sm:w-auto px-8 py-3 border border-gray-300 text-gray-600 font-bold tracking-widest hover:bg-gray-100 transition-all active:scale-95">
                返回上一页
            </button>
        </div>
    </div>
</div>
{% endblock %}
